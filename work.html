<!DOCTYPE html>

<head>

  <meta name="theme-color" content="#080808">
  <title>Work — Angular Photos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Gallery styles (inline, self-contained) ─────────── */
    .gallery {
      position: relative;
      padding: var(--gap);
    }
    .gallery-item {
      position: absolute;
      overflow: hidden;
      background: var(--color-surface);
      box-sizing: border-box;
    }
    .gallery--loading .gallery-item {
      position: relative;
      width: 100%;
      margin-bottom: var(--gap);
      top: auto !important;
      left: auto !important;
    }
    .gallery-item img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
      filter: brightness(.88);
      transition: transform .45s cubic-bezier(.25,.1,.25,1),
                  filter    .45s cubic-bezier(.25,.1,.25,1);
    }
    .gallery-item:hover img {
      transform: scale(1.04);
      filter: brightness(1);
    }
  </style>
</head>
<body>

  <a class="skip-link" href="#gallery">Skip to gallery</a>

  <header class="header" role="banner">
    <a href="index.html" class="logo" aria-label="Angular Photos — home">ANGULAR PHOTOS</a>
    <button class="nav-toggle" aria-controls="main-nav" aria-expanded="false" aria-label="Open navigation menu">

      <span aria-hidden="true"></span>

  <script>
    // ── Nav toggle ────────────────────────────────────────
    const toggle = document.querySelector('.nav-toggle');
    const nav    = document.getElementById('main-nav');

    toggle.addEventListener('click', () => {
      const open = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!open));
      toggle.setAttribute('aria-label', open ? 'Open navigation menu' : 'Close navigation menu');
      nav.classList.toggle('is-open', !open);
      document.body.style.overflow = open ? '' : 'hidden';
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && nav.classList.contains('is-open')) {
        toggle.setAttribute('aria-expanded', 'false');
        nav.classList.remove('is-open');
        document.body.style.overflow = '';
        toggle.focus();
      }
    });

    nav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        toggle.setAttribute('aria-expanded', 'false');
        nav.classList.remove('is-open');
        document.body.style.overflow = '';
      });
    });

    // ── JS Masonry ────────────────────────────────────────
    const gallery = document.querySelector('.gallery');
    const items   = Array.from(gallery.querySelectorAll('.gallery-item'));

    function getColumns() {
      const w = gallery.offsetWidth;
      if (w >= 900) return 3;
      if (w >= 480) return 2;
      return 1;
    }

    function layout() {
      const gapRaw = getComputedStyle(document.documentElement)
                       .getPropertyValue('--gap').trim();
      const gap  = parseFloat(gapRaw) || 4;
      const cols = getColumns();
      const pad  = parseFloat(getComputedStyle(gallery).paddingLeft) || gap;
      const total = gallery.offsetWidth - pad * 2;
      const colW  = (total - gap * (cols - 1)) / cols;
      const tops  = new Array(cols).fill(0);

      gallery.classList.remove('gallery--loading');

      items.forEach(item => {
        const col  = tops.indexOf(Math.min(...tops));
        const left = pad + col * (colW + gap);
        const top  = tops[col];
        item.style.width  = colW + 'px';
        item.style.left   = left + 'px';
        item.style.top    = top  + 'px';
        tops[col] += item.offsetHeight + gap;
      });

      gallery.style.height = Math.max(...tops) + pad + 'px';
    }

    gallery.classList.add('gallery--loading');
    gallery.style.opacity = '0';

    function waitForImages(imgs, cb) {
      let remaining = imgs.length;
      if (remaining === 0) { cb(); return; }
      imgs.forEach(img => {
        const check = () => {
          if (img.naturalHeight > 0) {
            if (--remaining === 0) cb();
          } else {
            setTimeout(check, 50);
          }
        };
        if (img.complete) { check(); }
        else {
          img.addEventListener('load',  check);
          img.addEventListener('error', () => { if (--remaining === 0) cb(); });
        }
      });
    }

    waitForImages(items.map(i => i.querySelector('img')), () => {
      layout();
      gallery.style.transition = 'opacity .6s ease';
      gallery.style.opacity    = '1';
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(layout, 100);
    });
  </script>

</body>
