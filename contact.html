<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Angular Photos — get in touch for music, events and indie business photography.">
  <meta name="theme-color" content="#080808">
  <title>Contact — Angular Photos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header" role="banner">
    <a href="index.html" class="logo" aria-label="Angular Photos — home">ANGULAR PHOTOS</a>
    <button class="nav-toggle" aria-controls="main-nav" aria-expanded="false" aria-label="Open navigation menu">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>
    <nav id="main-nav" class="nav" aria-label="Main navigation">
      <a href="index.html">WORK</a>
      <a href="about.html">ABOUT</a>
      <a href="contact.html" aria-current="page">CONTACT</a>
    </nav>
  </header>

  <main>
    <section class="contact">
      <p class="contact-intro">Let's make something worth shooting.</p>
      <div class="contact-links">
        <a href="mailto:albertosantinon7@gmail.com">albertosantinon7@gmail.com</a>
        <a href="https://instagram.com/angularphotos">@angularphotos</a>
      </div>
      <p class="about-text" style="margin-top: 2rem; opacity: .45; font-size: .85rem;">
        Have a project in mind, need promo shots, or just want to talk?<br>
        I'm always up for a coffee — or a glass of prosecco.
      </p>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <p><a href="https://instagram.com/angularphotos" aria-label="Angular Photos on Instagram">@angularphotos</a></p>
    <p>© 2026 Angular Photos</p>
  </footer>

  <script>
    const toggle = document.querySelector('.nav-toggle');
    const nav    = document.getElementById('main-nav');

    toggle.addEventListener('click', () => {
      const open = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!open));
      toggle.setAttribute('aria-label', open ? 'Open navigation menu' : 'Close navigation menu');
      nav.classList.toggle('is-open', !open);
      document.body.style.overflow = open ? '' : 'hidden';
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && nav.classList.contains('is-open')) {
        toggle.setAttribute('aria-expanded', 'false');
        toggle.setAttribute('aria-label', 'Open navigation menu');
        nav.classList.remove('is-open');
        document.body.style.overflow = '';
        toggle.focus();
      }
    });

    nav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        toggle.setAttribute('aria-expanded', 'false');
        nav.classList.remove('is-open');
        document.body.style.overflow = '';
      });
    });
  </script>

</body>
</html>
