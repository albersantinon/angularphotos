<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angular Photos – Retro Film Portfolio</title>

    <!-- Font stile titoli anni '90 -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Effetto grana pellicola */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.18;
            mix-blend-mode: overlay;
            z-index: 9999;
        }

        header {
            text-align: center;
            padding: 60px 20px 30px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            letter-spacing: 2px;
            margin: 0;
            color: #f2e9d8;
            text-shadow: 0 0 6px rgba(255, 220, 180, 0.3);
        }

        header p {
            margin-top: 10px;
            font-size: 1.1rem;
            opacity: 0.7;
        }

        /* Galleria stile pellicola */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        .frame {
            background: #111;
            padding: 12px;
            border: 2px solid #2a2a2a;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        /* Bordi tipo fotogramma 35mm */
        .frame::before,
        .frame::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 12px;
            left: 0;
            background: repeating-linear-gradient(
                to right,
                #000 0 10px,
                #222 10px 20px
            );
            opacity: 0.35;
        }

        .frame::before { top: -12px; }
        .frame::after { bottom: -12px; }

        .frame img {
            width: 100%;
            height: auto;
            display: block;
            filter: contrast(0.9) saturate(0.8);
            transition: 0.3s ease;
        }

        .frame img:hover {
            transform: scale(1.03);
            filter: contrast(1) saturate(1);
        }

        footer {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
            font-size: 0.9rem;
        }

        a {
            color: #d7b98c;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>Angular Photos</h1>
        <p>Portfolio analogico – estetica 35mm, anni ’90</p>
    </header>

    <section class="gallery">

        <!-- Sostituisci questi placeholder con le tue foto -->
        <div class="frame">
            <img src="images/uno.jpg" alt="Foto 1">
        </div>

        <div class="frame">
            <img src="images/due.jpg" alt="Foto 2">
        </div>

        <div class="frame">
            <img src="images/tre.jpg" alt="Foto 3">
        </div>

        <div class="frame">
            <img src="images/quattro.jpg" alt="Foto 4">
        </div>

        <div class="frame">
            <img src="images/cinque.jpg" alt="Foto 5">
        </div>

        <div class="frame">
            <img src="images/sei.jpg" alt="Foto 6">
        </div>

    </section>

    <footer>
        © 2026 Angular Photos — Tutti i diritti riservati
    </footer>

</body>
</html>
