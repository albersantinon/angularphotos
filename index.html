<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANGULAR PHOTOS — Portfolio</title>

    <!-- Helvetica Neue (fallback: Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ----------- BASE STYLE ----------- */
        body {
            margin: 0;
            font-family: "Helvetica Neue", Inter, sans-serif;
            background: #0a0a0a;
            color: #f2f2f2;
            overflow-x: hidden;
        }

        /* Background blur texture */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=60');
            background-size: cover;
            background-position: center;
            filter: blur(18px) brightness(0.35);
            z-index: -1;
        }

        /* ----------- HEADER ----------- */
        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        h1 {
            font-size: 56px;
            font-weight: 600;
            letter-spacing: 4px;
            margin: 0;
        }

        .subtitle {
            margin-top: 12px;
            font-size: 20px;
            opacity: 0.75;
            letter-spacing: 1px;
        }

        .bio {
            margin-top: 25px;
            font-size: 16px;
            opacity: 0.65;
            line-height: 1.6;
        }

        /* ----------- GALLERY ----------- */
        .gallery {
            padding: 40px 20px 80px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 28px;
            max-width: 1400px;
            margin: auto;
        }

        .photo {
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.35s ease;
        }

        .photo img:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* ----------- FOOTER ----------- */
        footer {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        <h1>ANGULAR PHOTOS</h1>
        <div class="subtitle">PHOTOS & VIDEOS — VISUAL STORYTELLER</div>
        <div class="bio">MCR ↔ VCE<br>Portfolio di Alberto Santinon</div>
    </header>

    <section class="gallery">

        <!-- FOTO REALI DELLA TUA CARTELLA -->
        <div class="photo"><img src="images/uno.jpg" alt=""></div>
        <div class="photo"><img src="images/due.jpeg" alt=""></div>
        <div class="photo"><img src="images/tre.jpeg" alt=""></div>
        <div class="photo"><img src="images/quattro.jpg" alt=""></div>
        <div class="photo"><img src="images/cinque.jpg" alt=""></div>
        <div class="photo"><img src="images/sei.jpg" alt=""></div>
        <div class="photo"><img src="images/sette.jpg" alt=""></div>
        <div class="photo"><img src="images/otto.jpg" alt=""></div>
        <div class="photo"><img src="images/nove.jpg" alt=""></div>

    </section>

    <footer>
        © 2026 ANGULAR PHOTOS — All Rights Reserved
    </footer>

</body>
</html>
