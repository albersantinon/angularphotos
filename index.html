<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Angular Photos — A curated portfolio of documentary and artistic photography.">
  <meta name="theme-color" content="#0d0d0d">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Angular Photos — Work">
  <meta property="og:description" content="A curated portfolio of documentary and artistic photography.">
  <meta property="og:url" content="https://angularphotos.com/">

  <title>Angular Photos — Work</title>

  <!-- Preconnect to font origins before the stylesheet request -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    /* ── Reset & base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:      #0d0d0d;
      --color-surface: #1a1a1a;
      --color-text:    #e8e6e1;
      --color-muted:   #888;
      --color-accent:  #e8e6e1;
      --font-main:     'Inter', sans-serif;
      --header-h:      56px;
      --gap:           clamp(8px, 1.5vw, 16px);
      --radius:        4px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-main);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Skip link (accessibility) ──────────────────────── */
    .skip-link {
      position: absolute;
      top: -9999px;
      left: 8px;
      padding: 8px 12px;
      background: var(--color-accent);
      color: #000;
      font-size: .875rem;
      font-weight: 700;
      border-radius: var(--radius);
      z-index: 9999;
      text-decoration: none;
    }
    .skip-link:focus { top: 8px; }

    /* ── Focus styles ───────────────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 3px;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: clamp(16px, 4vw, 48px);
      background: var(--color-bg);
      border-bottom: 1px solid #222;
      /* Prevent content jumping under sticky header */
    }

    .logo {
      font-size: clamp(.75rem, 2vw, .875rem);
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--color-text);
      text-decoration: none;
      flex-shrink: 0;
    }
    .logo:hover { opacity: .75; }

    /* Desktop nav */
    .nav {
      display: flex;
      gap: clamp(16px, 3vw, 40px);
    }
    .nav a {
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .1em;
      color: var(--color-muted);
      text-decoration: none;
      transition: color .2s;
    }
    .nav a:hover,
    .nav a[aria-current="page"] { color: var(--color-text); }

    /* Hamburger button (hidden on desktop) */
    .nav-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: var(--radius);
    }
    .nav-toggle span {
      display: block;
      height: 1.5px;
      background: var(--color-text);
      border-radius: 2px;
      transition: transform .25s, opacity .25s;
      transform-origin: center;
    }
    /* Animate to X when open */
    .nav-toggle[aria-expanded="true"] span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-toggle[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
    .nav-toggle[aria-expanded="true"] span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── Gallery ─────────────────────────────────────────── */
    main { flex: 1; }

    /* ── Masonry gallery ─────────────────────────────────── */
    .gallery {
      padding: var(--gap);
      /* CSS columns give us true masonry — images stack top-to-bottom
         in each column, no gaps from mismatched heights              */
      columns: 1;
      column-gap: var(--gap);
    }

    /* 2 columns from 480px, 3 from 900px */
    @media (min-width: 480px)  { .gallery { columns: 2; } }
    @media (min-width: 900px)  { .gallery { columns: 3; } }

    .gallery-item {
      display: block;
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--color-surface);
      /* break-inside prevents an image being split across two columns */
      break-inside: avoid;
      margin-bottom: var(--gap);
    }

    .gallery-item img {
      display: block;
      width: 100%;
      height: auto;   /* natural height — portrait images show in full */
      object-fit: cover;
      transition: transform .4s ease, filter .4s ease;
    }
    .gallery-item:hover img,
    .gallery-item:focus-within img {
      transform: scale(1.04);
      filter: brightness(1.1);
    }

    /* ── Footer ──────────────────────────────────────────── */
    .footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 20px clamp(16px, 4vw, 48px);
      border-top: 1px solid #222;
      font-size: .75rem;
      color: var(--color-muted);
      letter-spacing: .04em;
    }

    /* ── Responsive: collapse nav on small screens ───────── */
    @media (max-width: 600px) {
      .nav-toggle { display: flex; }

      .nav {
        /* Hidden off-screen by default */
        position: fixed;
        inset: var(--header-h) 0 0 0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        background: var(--color-bg);
        opacity: 0;
        pointer-events: none;
        transition: opacity .25s;
      }
      .nav.is-open {
        opacity: 1;
        pointer-events: auto;
      }
      .nav a { font-size: 1.25rem; letter-spacing: .12em; }
    }

    /* ── Reduced-motion override ─────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .gallery-item img,
      .nav-toggle span,
      .nav { transition: none; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>

  <!-- Skip to main content (keyboard / screen-reader users) -->
  <a class="skip-link" href="#gallery">Skip to gallery</a>

  <!-- HEADER -->
  <header class="header" role="banner">
    <a href="index.html" class="logo" aria-label="Angular Photos — home">ANGULAR PHOTOS</a>

    <!-- Hamburger (visible only on mobile) -->
    <button class="nav-toggle"
            aria-controls="main-nav"
            aria-expanded="false"
            aria-label="Open navigation menu">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>

    <nav id="main-nav" class="nav" aria-label="Main navigation">
      <a href="index.html" aria-current="page">WORK</a>
      <a href="about.html">ABOUT</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </header>

  <!-- GALLERY -->
  <main id="main-content">
    <section class="gallery" id="gallery" aria-label="Photography portfolio">

      <!--
        First image gets fetchpriority="high" so the browser loads it
        immediately without waiting for the layout pass.
        Remaining images stay lazy-loaded.

        Every img needs a descriptive alt — update each one with a real
        description so screen-reader users understand what's shown.
      -->
      <a href="images/church.jpg" class="gallery-item">
        <img src="images/church.jpg"
             fetchpriority="high"
             alt="Church interior with dramatic light streaming through stained-glass windows">
      </a>
      <a href="images/elastic.jpg" class="gallery-item">
        <img src="images/elastic.jpg" loading="lazy" alt="Elastic band stretched in motion">
      </a>
      <a href="images/granny.jpg" class="gallery-item">
        <img src="images/granny.jpg" loading="lazy" alt="Elderly woman sitting in quiet contemplation">
      </a>
      <a href="images/drummer.jpg" class="gallery-item">
        <img src="images/drummer.jpg" loading="lazy" alt="Drummer mid-performance on stage">
      </a>
      <a href="images/bosco.jpg" class="gallery-item">
        <img src="images/bosco.jpg" loading="lazy" alt="Bosco">
      </a>
      <a href="images/brogo.jpg" class="gallery-item">
        <img src="images/brogo.jpg" loading="lazy" alt="Brogo landscape">
      </a>
      <a href="images/club27.jpg" class="gallery-item">
        <img src="images/club27.jpg" loading="lazy" alt="Club 27 scene">
      </a>
      <a href="images/kid.jpg" class="gallery-item">
        <img src="images/kid.jpg" loading="lazy" alt="Child playing outdoors">
      </a>
      <a href="images/phantoms.jpg" class="gallery-item">
        <img src="images/phantoms.jpg" loading="lazy" alt="Ghostly figures in low light">
      </a>
      <a href="images/jake.jpg" class="gallery-item">
        <img src="images/jake.jpg" loading="lazy" alt="Portrait of Jake">
      </a>
      <a href="images/pontile.jpg" class="gallery-item">
        <img src="images/pontile.jpg" loading="lazy" alt="Pier extending over calm water">
      </a>
      <a href="images/cheuk.jpg" class="gallery-item">
        <img src="images/cheuk.jpg" loading="lazy" alt="Portrait of Cheuk">
      </a>
      <a href="images/pinkroom.jpg" class="gallery-item">
        <img src="images/pinkroom.jpg" loading="lazy" alt="Pink-walled room bathed in warm light">
      </a>
      <a href="images/whitehotel.jpg" class="gallery-item">
        <img src="images/whitehotel.jpg" loading="lazy" alt="White hotel corridor">
      </a>
      <a href="images/waxx.jpeg" class="gallery-item">
        <img src="images/waxx.jpeg" loading="lazy" alt="Waxx venue interior">
      </a>
      <a href="images/sherwood.jpg" class="gallery-item">
        <img src="images/sherwood.jpg" loading="lazy" alt="Sherwood forest scene">
      </a>

    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer" role="contentinfo">
    <p><a href="https://instagram.com/angularphotos"
          style="color:inherit;text-decoration:none;"
          aria-label="Angular Photos on Instagram">@angularphotos</a></p>
    <p><small>© 2026 Angular Photos — All rights reserved.</small></p>
  </footer>

  <script>
    // ── Mobile nav toggle ───────────────────────────────────
    const toggle = document.querySelector('.nav-toggle');
    const nav    = document.getElementById('main-nav');

    toggle.addEventListener('click', () => {
      const open = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!open));
      toggle.setAttribute('aria-label', open ? 'Open navigation menu' : 'Close navigation menu');
      nav.classList.toggle('is-open', !open);
    });

    // Close nav if user presses Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && nav.classList.contains('is-open')) {
        toggle.setAttribute('aria-expanded', 'false');
        toggle.setAttribute('aria-label', 'Open navigation menu');
        nav.classList.remove('is-open');
        toggle.focus();
      }
    });

    // Close nav when a link inside it is clicked (single-page feel)
    nav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        toggle.setAttribute('aria-expanded', 'false');
        nav.classList.remove('is-open');
      });
    });
  </script>

</body>
</html>
