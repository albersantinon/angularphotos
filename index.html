<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angular Photos – Portfolio</title>

    <!-- Font elegante -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #111;
            color: #eee;
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.4rem;
            margin: 0;
            font-weight: 700;
        }

        header p {
            margin-top: 10px;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        a {
            color: #4ea3ff;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>Angular Photos</h1>
        <p>Portfolio fotografico di Alberto Santinon</p>
    </header>

    <section class="gallery">
        <!-- Sostituisci questi link con le tue foto -->
        <img src="https://placehold.co/800x600" alt="Foto 1">
        <img src="https://placehold.co/800x600" alt="Foto 2">
        <img src="https://placehold.co/800x600" alt="Foto 3">
        <img src="https://placehold.co/800x600" alt="Foto 4">
        <img src="https://placehold.co/800x600" alt="Foto 5">
        <img src="https://placehold.co/800x600" alt="Foto 6">
    </section>

    <footer>
        © 2026 Angular Photos — <a href="mailto:tuamail@example.com">Contatti</a>
    </footer>

</body>
</html>
